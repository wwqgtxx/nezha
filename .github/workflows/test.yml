name: Run Tests

on:
  push:
    branches:
      - master
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "resource/**"
      - ".github/workflows/test.yml"
  pull_request:
    branches:
      - master

jobs:
  tests:
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu, windows, macos]
        
    runs-on: ${{ matrix.os }}-latest
    env:
      CGO_ENABLED: 0
      GO111MODULE: on
    steps:
      - uses: actions/checkout@v4
        
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          
      - name: Unit test
        run: |
          go test -v ./...
          
      - name: Build test
        run: go build -v ./cmd/dashboard
